services:
  # MongoDB Database
  mongodb:
    image: mongo:8.0
    container_name: customdash-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: customdash
    volumes:
      - mongodb_data:/data/db
    networks:
      - customdash-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (pour cache et BullMQ)
  redis:
    image: redis:7-alpine
    container_name: customdash-redis
    ports:
      - '6379:6379'
    networks:
      - customdash-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch (pour les sources de donnees ES)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: customdash-elasticsearch
    ports:
      - '9200:9200'
      - '9300:9300'
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=customdash-cluster
    networks:
      - customdash-network
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10

  # Core API
  # core-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   container_name: customdash-core-api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: development
  #     PORT: 3000
  #     MONGODB_URI: mongodb://admin:password@mongodb:27017/customdash?authSource=admin
  #     JWT_SECRET: your-super-secret-jwt-key-change-in-production-8x7fk2m9p
  #     JWT_EXPIRES_IN: 24h
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     AI_MODEL: gpt-4o-mini
  #     CORS_ORIGINS: http://localhost:5173,http://frontend:5173
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - customdash-network
  #   volumes:
  #     - ./src:/app/src
  #     - ./uploads:/app/uploads
  #     - ./test-fixtures/salles-data.csv:/app/uploads/salles-data.csv:ro
  #   restart: unless-stopped

  # Mock JSON API - Salles
  salles-api:
    image: node:20-alpine
    container_name: customdash-salles-api
    working_dir: /app
    ports:
      - '3001:3001'
    volumes:
      - ./test-fixtures/salles-api:/app:ro
    command: node server.js
    networks:
      - customdash-network
    restart: unless-stopped

  # Mock JSON API - Orders (for testing visualizations)
  orders-api:
    image: node:20-alpine
    container_name: customdash-orders-api
    working_dir: /app
    ports:
      - '3002:3002'
    volumes:
      - ./test-fixtures/orders-api:/app:ro
    command: node server.js
    networks:
      - customdash-network
    restart: unless-stopped

  # Elasticsearch Index Initializer
  es-init:
    image: curlimages/curl:latest
    container_name: customdash-es-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./test-fixtures/es-init.sh:/init.sh:ro
      - ./test-fixtures/salles-data.json:/data/salles-data.json:ro
    entrypoint: ['/bin/sh', '/init.sh']
    networks:
      - customdash-network

networks:
  customdash-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  elasticsearch_data:
    driver: local
