services:
  core-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=test
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/datavise_test
      - JWT_SECRET=test-jwt-secret-for-e2e-testing
      - JWT_EXPIRES_IN=1d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      salles-api:
        condition: service_started
    volumes:
      - ./test-fixtures:/app/test-fixtures:ro
      - ./uploads:/app/uploads
    networks:
      - e2e-network

  mongo:
    image: mongo:7
    ports:
      - '27018:27017'
    environment:
      - MONGO_INITDB_DATABASE=datavise_test
    volumes:
      - mongo-e2e-data:/data/db
      - ./test-fixtures/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - e2e-network

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-e2e-data:/data
    networks:
      - e2e-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    ports:
      - '9201:9200'
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    volumes:
      - es-e2e-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - e2e-network

  es-init:
    image: curlimages/curl:latest
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./test-fixtures/es-init.sh:/init.sh:ro
      - ./test-fixtures/salles-data.json:/data/salles-data.json:ro
    entrypoint: ['/bin/sh', '/init.sh']
    networks:
      - e2e-network

  salles-api:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '3001:3001'
    volumes:
      - ./test-fixtures/salles-api:/app:ro
    command: node server.js
    networks:
      - e2e-network

volumes:
  mongo-e2e-data:
  redis-e2e-data:
  es-e2e-data:

networks:
  e2e-network:
    driver: bridge
